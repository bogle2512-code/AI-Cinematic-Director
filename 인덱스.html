<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AI Cinematic Workflow Director</title>
<style>
:root{
  --bg:#0f1117;--card:#171a23;--text:#f5f7fb;--muted:#aeb6c8;--line:rgba(255,255,255,.13);
  --a:#7c5cff;--b:#00d4ff;--ok:#21d07a;--bad:#ff5c7a;
}
*{box-sizing:border-box}
body{
  margin:0;color:var(--text);
  background:radial-gradient(circle at 10% 0,rgba(124,92,255,.34),transparent 34%),
  radial-gradient(circle at 90% 0,rgba(0,212,255,.2),transparent 30%),var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif;
}
header{padding:24px 16px 10px;text-align:center}
h1{margin:0;font-size:clamp(28px,5vw,46px);letter-spacing:-.04em}
.tabs{
  position:sticky;top:0;z-index:50;display:flex;gap:8px;overflow-x:auto;padding:10px;
  background:rgba(15,17,23,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);border-bottom:1px solid var(--line)
}
.tabs button{
  white-space:nowrap;border:1px solid var(--line);border-radius:999px;padding:9px 12px;font-size:13px;
  font-weight:900;color:white;background:rgba(255,255,255,.055);cursor:pointer
}
.tabs button.active{background:linear-gradient(135deg,var(--a),var(--b));border-color:transparent}
.wrap{width:min(1200px,100%);margin:0 auto;padding:14px 14px 90px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:rgba(23,26,35,.92);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.full{grid-column:1/-1}
h2{margin:0 0 12px;font-size:24px;letter-spacing:-.03em}
label{display:block;margin:12px 0 6px;font-weight:900}
input,textarea,select{
  width:100%;border:1px solid var(--line);border-radius:14px;background:#0c0e15;color:var(--text);
  padding:12px;font-size:15px;outline:none
}
textarea{min-height:120px;resize:vertical;line-height:1.55}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btns{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}
button{border:0;border-radius:14px;padding:11px 14px;font-weight:900;color:white;background:linear-gradient(135deg,var(--a),var(--b));cursor:pointer}
button.ghost{background:rgba(255,255,255,.08);border:1px solid var(--line)}
button.ok{background:linear-gradient(135deg,#21d07a,#00d4ff)}
button.danger{background:linear-gradient(135deg,#ff5c7a,#ff8d5c)}
.section{display:none}.section.active{display:block}
.notice{background:rgba(255,202,58,.08);border:1px solid rgba(255,202,58,.26);color:#ffe8a8;padding:12px;border-radius:14px;margin-bottom:14px;line-height:1.55}
.output,.editableOutput{
  width:100%;white-space:pre-wrap;background:#0c0e15;border:1px solid var(--line);border-radius:14px;padding:16px;
  color:#edf2ff;line-height:1.62;font-family:inherit;font-size:15px
}
.output{min-height:auto;overflow:visible}
.editableOutput{min-height:420px;overflow:auto;resize:vertical}
.cutGrid,.cutPromptGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:14px}
.cutCard,.cutPromptCard{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.04);padding:12px}
.cutCard strong,.cutPromptCard h3{display:block;margin:0 0 10px;font-size:16px}
.cutCard span{display:block;color:var(--muted);font-size:12px;line-height:1.45}
.cutPromptCard textarea{width:100%;min-height:260px;border:1px solid var(--line);border-radius:12px;background:#0c0e15;color:#edf2ff;padding:12px;font-size:13px;line-height:1.5}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:10px}
.thumb{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#0c0e15}
.thumb img{width:100%;height:120px;object-fit:cover;display:block}
.thumb small{display:block;padding:7px;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.copyToast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#111827;color:white;border:1px solid var(--line);padding:11px 16px;border-radius:999px;display:none;z-index:999}
a{color:#7dd3fc;font-weight:700}
@media(max-width:820px){.grid,.row{grid-template-columns:1fr}.wrap{padding-left:10px;padding-right:10px}.card{padding:14px}.tabs button{font-size:12px;padding:8px 10px}}

.noScrollOutput{
  min-height:auto !important;
  max-height:none !important;
  overflow:visible !important;
}
</style>
</head>
<body>
<header><h1>AI Cinematic Workflow Director</h1></header>

<nav class="tabs" id="tabs">
  <button class="active" data-tab="input">입력</button>
  <button data-tab="all">전체 결과</button>
  <button data-tab="character">전문캐릭터시트</button>
  <button data-tab="storyboard">스토리보드</button>
  <button data-tab="image">이미지 프롬프트</button>
  <button data-tab="video">영상 프롬프트</button>
  <button data-tab="music">SUNO 음악</button>
</nav>

<main class="wrap">
<section class="section active" id="input">
  <div class="grid">
    <div class="card">
      <h2>사용자 입력</h2>
      <div class="notice">GPT 바로가기: <a href="https://chatgpt.com/" target="_blank">https://chatgpt.com/</a></div>
      <label>장르</label><input id="genre" value="" />
      <label>주제</label><input id="topic" value="" />
      <label>배경 / 장소 / 사건 순서</label>
      <textarea id="background"></textarea>
      <label>분위기</label><textarea id="mood"></textarea>
    </div>
    <div class="card">
      <h2>제작 조건</h2>
      <label>등장인물</label>
      <textarea id="characters"></textarea>
      <div class="row">
        <div><label>러닝타임</label><input id="runtime" value="" /></div>
        <div><label>컷수</label><input id="cutCount" type="number" min="1" max="30" value="" /></div>
      </div>
      <label>스타일</label><textarea id="style"></textarea>
      <label>성별 캐릭터 기준</label>
      <select id="characterGender">
        <option value="custom">입력한 등장인물 기준</option>
        <option value="female">여자 캐릭터 고정 프롬프트</option>
        <option value="male">남자 캐릭터 고정 프롬프트</option>
      </select>
      <label>참고 이미지 업로드</label><input type="file" id="referenceImages" accept="image/*" multiple />
      <div class="thumbs" id="imagePreview"></div>
      <div class="btns">
        <button class="ok" onclick="generateWorkflow()">전체 워크플로우 생성</button>
        <button class="ghost" onclick="saveInputs()">입력 저장</button>
        <button class="ghost" onclick="loadInputs()">불러오기</button>
        <button class="danger" onclick="clearInputs()">초기화</button>
      </div>
    </div>
    <div class="card full">
      <h2>컷별 계획 미리보기</h2>
      <div class="notice">입력한 배경/장소/사건 순서를 기준으로 컷별 계획이 생성됩니다. 각 카테고리는 이 계획을 공유합니다.</div>
      <div id="cutPreview" class="cutGrid"></div>
    </div>
  </div>
</section>

<section class="section" id="all"><div class="card full"><h2>전체 결과</h2><div class="btns"><button onclick="generateWorkflow()">다시 생성</button><button class="ghost" onclick="copyText('fullOutput')">전체 복사</button><button class="ghost" onclick="downloadText()">TXT 다운로드</button></div><div class="output" id="fullOutput"></div></div></section>
<section class="section" id="character"><div class="card full"><h2>전문캐릭터시트</h2><div class="notice">캐릭터시트 프롬프트만 출력됩니다.</div><div class="btns"><button onclick="generateWorkflow()">다시 생성</button><button class="ghost" onclick="copyText('characterOutput')">캐릭터시트 복사</button></div><div class="output" id="characterOutput"></div></div></section>
<section class="section" id="storyboard"><div class="card full"><h2>스토리보드</h2><div class="btns"><button onclick="generateWorkflow()">다시 생성</button><button class="ghost" onclick="copyText('storyboardOutput')">스토리보드 복사</button></div><div class="output" id="storyboardOutput"></div></div></section>
<section class="section" id="image"><div class="card full"><h2>이미지 프롬프트</h2><div class="btns"><button onclick="generateWorkflow()">다시 생성</button><button class="ghost" onclick="copyText('imageOutput')">전체 이미지 프롬프트 복사</button></div><textarea class="editableOutput" id="imageOutput"></textarea><div id="imageCutContainer" class="cutPromptGrid"></div></div></section>
<section class="section" id="video"><div class="card full"><h2>영상 프롬프트</h2><div class="btns"><button onclick="generateWorkflow()">다시 생성</button><button class="ghost" onclick="copyText('videoOutput')">전체 영상 프롬프트 복사</button></div><textarea class="editableOutput" id="videoOutput"></textarea><div id="videoCutContainer" class="cutPromptGrid"></div></div></section>
<section class="section" id="music"><div class="card full"><h2>SUNO 음악</h2><div class="notice">SUNO 바로가기: <a href="https://suno.com/discover" target="_blank">https://suno.com/discover</a></div><div class="btns"><button onclick="generateWorkflow()">다시 생성</button><button class="ghost" onclick="copyText('musicOutput')">SUNO 복사</button></div><div class="output noScrollOutput" id="musicOutput"></div></div></section>
</main>
<div class="copyToast" id="copyToast">완료</div>

<script>
const $ = id => document.getElementById(id);
const COMMON_STYLE = `cinematic commercial film,
ultra realistic,
Kodak Portra 400 color grading,
anamorphic lens,
soft film grain,
cinematic lighting,
shallow depth of field,
smooth camera movement,
natural motion blur,
premium advertisement style,
4K quality`;
const MALE_PROMPT = `young Korean man, early 20s, lean athletic build, short black hair, clean masculine face, warm emotional eyes, ultra realistic, same character design, consistent face`;
const FEMALE_PROMPT = `young Korean woman, early 20s, natural beauty, long black hair, soft skin texture, warm emotional eyes, slim body, ultra realistic, same character design, consistent face`;
const cameraMoves = ["drone reveal","slow dolly in","smooth tracking shot","handheld follow shot","orbit movement","crane up","push in","pull out","whip pan transition","steadycam walk","cinematic tilt up"];
const shotSizes = ["Extreme Wide Shot","Wide Shot","Medium Shot","Close Up","Hero Shot","Detail Shot","Over Shoulder Shot","Aerial Shot"];
const lenses = ["24mm","35mm","50mm","70mm","85mm"];
let uploadedImageNames = [];

document.querySelectorAll("#tabs button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    btn.classList.add("active");
    $(btn.dataset.tab).classList.add("active");
  });
});

$("referenceImages").addEventListener("change", e=>{
  uploadedImageNames = [];
  $("imagePreview").innerHTML = "";
  Array.from(e.target.files || []).forEach((file,i)=>{
    uploadedImageNames.push(file.name);
    const reader = new FileReader();
    reader.onload = ev=>{
      const div = document.createElement("div");
      div.className = "thumb";
      div.innerHTML = `<img src="${ev.target.result}" alt="reference"><small>REF ${i+1}. ${file.name}</small>`;
      $("imagePreview").appendChild(div);
    };
    reader.readAsDataURL(file);
  });
});

function getOutput(id){
  const el = $(id);
  if(!el) return "";
  return ("value" in el) ? el.value : el.textContent;
}
function setOutput(id,text){
  const el = $(id);
  if(!el) return;
  if("value" in el) el.value = text;
  else el.textContent = text;
}
function escapeHtml(text){
  return String(text || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function getInput(){
  const scenes = $("background").value.replace(/\r/g,"").split("\n").map(v=>v.trim()).filter(Boolean);
  const userCharacter = $("characters").value.trim();
  let fixedCharacter = userCharacter;
  if($("characterGender").value === "male") fixedCharacter = userCharacter ? MALE_PROMPT + ", " + userCharacter : MALE_PROMPT;
  if($("characterGender").value === "female") fixedCharacter = userCharacter ? FEMALE_PROMPT + ", " + userCharacter : FEMALE_PROMPT;
  return {
    genre:$("genre").value.trim() || "cinematic video",
    topic:$("topic").value.trim() || "untitled project",
    scenes: scenes.length ? scenes : ["main scene"],
    mood:$("mood").value.trim() || "cinematic emotional mood",
    characters:userCharacter || fixedCharacter,
    fixedCharacter:fixedCharacter || "main character",
    runtime:$("runtime").value.trim() || "60 seconds",
    cutCount:Math.max(1,Number($("cutCount").value || 1)),
    style:$("style").value.trim() || "cinematic film",
    references:uploadedImageNames
  };
}
function getPhase(i,total){
  const r = i / Math.max(1,total);
  if(r < .2) return "opening";
  if(r < .45) return "development";
  if(r < .65) return "emotional pause";
  if(r < .85) return "climax";
  return "ending";
}
function phaseMood(phase){
  return {
    "opening":"powerful opening reveal, emotional anticipation, cinematic scale",
    "development":"bright discovery, rising energy, rhythmic movement",
    "emotional pause":"quiet emotional pause, intimate tension, dramatic stillness",
    "climax":"climactic hero moment, dramatic light burst, powerful emotional impact",
    "ending":"warm resolution, lingering emotion, cinematic final frame"
  }[phase] || "cinematic emotional mood";
}
function phaseColor(phase){
  return {
    "opening":"blue and cyan color palette, cool natural light, calm contrast",
    "development":"yellow and gold color palette, pastel highlights, bright daylight",
    "emotional pause":"muted colors, deeper shadows, emotional contrast",
    "climax":"gold color palette, high contrast, glowing highlights, dramatic bloom",
    "ending":"warm gold and night blue color palette, soft highlights"
  }[phase] || "cinematic color grading";
}
function phaseImageAction(phase,scene){
  return {
    "opening":`cinematic opening reveal of ${scene}, establishing the story world with a strong visual hook`,
    "development":`the main character moves through ${scene}, energy rises with natural motion and emotional discovery`,
    "emotional pause":`the main character pauses inside ${scene}, quiet emotional tension builds through a close cinematic moment`,
    "climax":`powerful hero moment in ${scene}, dramatic light explodes with intense emotional peak`,
    "ending":`final emotional frame in ${scene}, warm light and a lingering cinematic ending`
  }[phase] || `cinematic scene in ${scene}`;
}
function phaseVideoAction(phase,scene){
  return {
    "opening":`camera glides into ${scene}, opening the story with cinematic scale and emotional anticipation`,
    "development":`camera follows the main character moving through ${scene}, energy rises with smooth cinematic rhythm`,
    "emotional pause":`camera slowly pushes toward the main character in ${scene}, emotional tension builds in subtle motion`,
    "climax":`camera accelerates around the main character in ${scene}, dramatic light and movement reach the emotional peak`,
    "ending":`camera slowly pulls back from ${scene}, leaving a warm cinematic afterimage`
  }[phase] || `cinematic camera movement in ${scene}`;
}
function phaseMotion(phase){
  return {
    "opening":"slow establishing movement, smooth cinematic reveal",
    "development":"smooth tracking movement, natural body motion, energetic pacing",
    "emotional pause":"slow push-in, subtle handheld tension, quiet emotional timing",
    "climax":"speed ramp, dramatic orbit movement, powerful camera acceleration",
    "ending":"slow pull-out, soft push-in, lingering final shot"
  }[phase] || "smooth cinematic movement";
}
function generateCutPlan(d){
  return Array.from({length:d.cutCount},(_,i)=>{
    const phase = getPhase(i,d.cutCount);
    const scene = d.scenes[i % d.scenes.length];
    return {
      no:i+1, phase, scene,
      shot:shotSizes[i % shotSizes.length],
      move:cameraMoves[i % cameraMoves.length],
      lens:lenses[i % lenses.length],
      length:Math.max(2,Math.round(60/d.cutCount))+"s",
      color:phaseColor(phase),
      emotion:phaseMood(phase),
      transition:i===0?"opening reveal":phase==="climax"?"speed ramp impact cut":phase==="ending"?"soft fade":"match cut / whip pan"
    };
  });
}
function renderCutPreview(plan){
  $("cutPreview").innerHTML = "";
  plan.forEach(c=>{
    const div = document.createElement("div");
    div.className = "cutCard";
    div.innerHTML = `<strong>CUT ${c.no} / ${c.phase}</strong><span><b>Scene:</b> ${escapeHtml(c.scene)}</span><span><b>Camera:</b> ${escapeHtml(c.shot)}, ${escapeHtml(c.move)}</span><span><b>Mood:</b> ${escapeHtml(c.emotion)}</span>`;
    $("cutPreview").appendChild(div);
  });
}
function titleFrom(d){return d.topic;}
function makeSynopsis(d,plan,title){
  const route = [...new Set(plan.map(c=>c.scene))].join(" → ");
  return `1. TITLE

${title}

2. LOGLINE

${plan[0].scene}에서 시작된 이야기가 ${plan[plan.length-1].scene}까지 이어지며, 입력한 주제와 분위기에 맞춰 하나의 시네마틱 영상으로 완성되는 ${d.runtime} ${d.genre}.

3. SYNOPSIS

이 영상은 "${d.topic}"을 주제로 한 ${d.genre}입니다.
전체 배경은 ${route} 순서로 구성됩니다.
등장인물은 ${d.characters}이며, 분위기는 ${d.mood}, 스타일은 ${d.style}입니다.

4. STORY STRUCTURE

1. 발단
${plan.filter(c=>c.phase==="opening").map(c=>c.scene).join(", ")}에서 세계관과 첫 후킹을 보여줍니다.

2. 전개
${plan.filter(c=>c.phase==="development").map(c=>c.scene).join(", ")}에서 인물과 장소의 에너지가 상승합니다.

3. 위기
${plan.filter(c=>c.phase==="emotional pause").map(c=>c.scene).join(", ")}에서 감정이 깊어지는 정적 구간을 만듭니다.

4. 절정
${plan.filter(c=>c.phase==="climax").map(c=>c.scene).join(", ")}에서 가장 강한 시각적 클라이맥스를 만듭니다.

5. 결말
${plan.filter(c=>c.phase==="ending").map(c=>c.scene).join(", ")}에서 여운 있는 마지막 장면을 만듭니다.`;
}
function makeCharacter(d){
  return `CHARACTER SHEET PROMPT

${COMMON_STYLE},

project title: ${d.topic},
genre: ${d.genre},
visual style: ${d.style},

${d.fixedCharacter},

professional character sheet,
character design based on user input,
same character design,
consistent face,
same face consistency,
front view,
left side view,
right side view,
back view,
full body walking pose,
facial expression sheet,
hairstyle detail,
costume detail based on user input,
accessories detail based on user input,
character color palette,
clean white background,
editorial character sheet layout,
production-ready design,
animation turnaround reference,
ultra detailed,
realistic lighting,
cinematic character presentation,
4K quality`;
}
function makeStoryboard(d,plan){
  return `5. STORYBOARD

${plan.map(c=>`CUT ${c.no} / ${c.phase}
Scene: ${c.scene}
Action: ${phaseImageAction(c.phase,c.scene)}
Emotion: ${c.emotion}
Camera: ${c.shot}, ${c.move}
Lens / Length: ${c.lens} / ${c.length}
Transition: ${c.transition}
Color: ${c.color}`).join("\n\n")}

6. ONE PAGE STORYBOARD

premium cinematic one page storyboard,
project title: ${d.topic},
genre: ${d.genre},
mood: ${d.mood},
visual style: ${d.style},
character: ${d.characters},
all cuts visible,
cut numbers,
scene labels,
action notes,
SFX notes,
camera movement notes,
color palette guide,
professional pitch board design`;
}
function makeBackground(d,plan){
  const unique = [];
  plan.forEach(c=>{if(!unique.find(x=>x.scene===c.scene)) unique.push(c);});
  return `8. BACKGROUND PROMPTS

${unique.map((c,i)=>`BACKGROUND ${i+1}
scene: ${c.scene}
visual purpose: ${phaseImageAction(c.phase,c.scene)}
mood: ${d.mood}
color: ${c.color}
detailed background,
cinematic environment,
realistic lighting,
atmospheric depth,
production quality location design,
scene continuity`).join("\n\n")}`;
}

function cleanEnglishText(text){
  return String(text || "")
    .replace(/[ㄱ-ㅎㅏ-ㅣ가-힣]+/g,"")
    .replace(/[^\w\s\-&]/g," ")
    .replace(/\s+/g," ")
    .trim();
}

function sceneLabel(scene){
  const raw = String(scene || "").trim();
  const pairs = [
    ["축구장","soccer stadium"],
    ["축구","soccer"],
    ["선수","player"],
    ["공","ball"],
    ["자동차","car"],
    ["차량","car"],
    ["도로","road"],
    ["바다","ocean"],
    ["산","mountain"],
    ["카페","cafe"],
    ["도시","city"],
    ["야경","night city"],
    ["공원","park"],
    ["꽃","flower field"],
    ["여행","travel scene"],
    ["주방","kitchen"],
    ["요리","cooking scene"],
    ["휴대폰","smartphone"],
    ["제품","product"]
  ];
  let converted = raw;
  pairs.forEach(([ko,en])=>{
    converted = converted.split(ko).join(en);
  });
  converted = cleanEnglishText(converted);
  return converted || "cinematic scene";
}

function cutTitle(c,index){
  const scene = sceneLabel(c.scene);
  const titles = {
    "opening":["오프닝 리빌","세계관 오프닝","첫 후킹 장면"],
    "development":["캐릭터 이동 장면","에너지 상승 장면","공간 탐색 장면"],
    "emotional pause":["감정 클로즈업","정적 감정 장면","내면 감정 장면"],
    "climax":["히어로 모먼트","비주얼 클라이맥스","절정 임팩트"],
    "ending":["마지막 엔딩 장면","감성 엔딩","클로징 샷"]
  };
  const list = titles[c.phase] || ["Cinematic Moment"];
  return `${scene} / ${list[index % list.length]}`;
}

function simpleImagePrompt(c,d,index){
  const title = cutTitle(c,index);
  const scene = sceneLabel(c.scene);
  return `CUT ${c.no} — ${title}

${COMMON_STYLE},

${d.fixedCharacter},

${phaseImageAction(c.phase, scene)},
${c.emotion},
${c.color},
${c.shot},
unique composition for cut ${c.no},
detailed background of ${scene},
same character consistency,
emotional storytelling,
vertical 9:16,
no text,
no logo,
no watermark`;
}

function simpleVideoPrompt(c,d,index){
  const title = cutTitle(c,index);
  const scene = sceneLabel(c.scene);
  return `CUT ${c.no} — ${title}

${COMMON_STYLE},

${d.fixedCharacter},

${phaseVideoAction(c.phase, scene)},
camera movement: ${c.move},
lens: ${c.lens} anamorphic lens,
shot size: ${c.shot},
cinematic motion: ${phaseMotion(c.phase)},
lighting: ${c.color},
emotional atmosphere: ${c.emotion},
realistic environment detail of ${scene},
natural motion blur,
smooth cinematic focus pull,
vertical 9:16,
4K quality`;
}

function buildSingleImagePrompt(c,d,index){
  return simpleImagePrompt(c,d,index || 0);
}
function buildSingleVideoPrompt(c,d,index){
  return simpleVideoPrompt(c,d,index || 0);
}
function makeImage(d,plan){
  return `IMAGE PROMPTS

${plan.map((c,index)=>buildSingleImagePrompt(c,d,index)).join("\n\n")}`;
}
function makeVideo(d,plan){
  return `VIDEO PROMPTS

${plan.map((c,index)=>buildSingleVideoPrompt(c,d,index)).join("\n\n")}`;
}
function makeMusic(d){
  return `15. SUNO MUSIC STYLE

1. STYLE
${d.mood},
${d.genre},
cinematic build-up,
premium advertisement music,
short-form optimized,
${d.runtime}

16. SUNO LYRICS

[Intro]
빛이 번져 와
조용한 길 위로

[Verse]
멈춰 있던 마음이
다시 움직여

[Hook]
Light me up
다시 피어나
Turn it up
이 순간 빛나`;
}
function makeOther(){
  return `13. NARRATION

입력한 주제와 분위기에 맞춰 영상의 감정 흐름을 전달하는 내레이션을 구성합니다.

14. DIALOGUE

대사는 최소화하고, 표정과 카메라 움직임 중심으로 감정을 전달합니다.

17. EDITING STYLE

opening hook, rhythm-based cut transition, slow motion on emotional beats, speed ramp on climax, lingering final shot

18. SOUND DESIGN

ambient sound, cinematic impact, transition whoosh, Foley detail, spatial audio feeling

19. FINAL DIRECTING POINT

입력한 장르, 주제, 배경, 분위기, 등장인물, 스타일이 모든 카테고리에 반영되어야 합니다.`;
}
function renderCutPromptCards(containerId,plan,makePrompt,d){
  const container = $(containerId);
  container.innerHTML = "";
  plan.forEach((c,index)=>{
    const prompt = makePrompt(c,d,index);
    const id = `${containerId}_cut_${c.no}`;
    const cardTitle = `CUT ${c.no} — ${cutTitle(c,index)}`;
    const card = document.createElement("div");
    card.className = "cutPromptCard";
    card.innerHTML = `<h3>${escapeHtml(cardTitle)}</h3><textarea id="${id}">${escapeHtml(prompt)}</textarea><div class="btns"><button class="ghost" onclick="copyText('${id}')">이 컷 복사</button></div>`;
    container.appendChild(card);
  });
}
function generateWorkflow(){
  const d = getInput();
  const plan = generateCutPlan(d);
  const title = titleFrom(d);
  renderCutPreview(plan);
  const synopsis = makeSynopsis(d,plan,title);
  const character = makeCharacter(d,plan,title);
  const storyboard = makeStoryboard(d,plan,title);
  const background = makeBackground(d,plan);
  const image = makeImage(d,plan);
  const video = makeVideo(d,plan);
  const music = makeMusic(d,plan);
  const other = makeOther(d,plan);

  setOutput("fullOutput",[synopsis,storyboard,character,background,image,video,music,other].join("\n\n"));
  setOutput("characterOutput",character);
  setOutput("storyboardOutput",storyboard);
  setOutput("imageOutput",image);
  setOutput("videoOutput",video);
  setOutput("musicOutput",music);
  renderCutPromptCards("imageCutContainer",plan,buildSingleImagePrompt,d);
  renderCutPromptCards("videoCutContainer",plan,buildSingleVideoPrompt,d);
  saveInputs(false);
  showToast("생성 완료");
}
function copyText(id){navigator.clipboard.writeText(getOutput(id)||"").then(()=>showToast("복사 완료"));}
function showToast(msg){
  const toast = $("copyToast");
  toast.textContent = msg || "완료";
  toast.style.display = "block";
  setTimeout(()=>toast.style.display="none",1400);
}
function saveInputs(show=true){
  const data = {genre:$("genre").value,topic:$("topic").value,background:$("background").value,mood:$("mood").value,characters:$("characters").value,runtime:$("runtime").value,cutCount:$("cutCount").value,style:$("style").value,characterGender:$("characterGender").value};
  localStorage.setItem("aiCinematicWorkflowInputBasedFinal", JSON.stringify(data));
  if(show) showToast("저장 완료");
}
function loadInputs(){
  const raw = localStorage.getItem("aiCinematicWorkflowInputBasedFinal");
  if(!raw) return;
  try{const data=JSON.parse(raw);Object.keys(data).forEach(k=>{if($(k))$(k).value=data[k];});}catch(e){}
}
function clearInputs(){if(!confirm("입력 내용을 초기화할까요?"))return;localStorage.removeItem("aiCinematicWorkflowInputBasedFinal");location.reload();}
function downloadText(){
  const blob = new Blob([getOutput("fullOutput") || ""], {type:"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "ai_cinematic_workflow_result.txt";
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}
let autoGenerateTimer = null;
function setupAutoRegenerate(){
  ["genre","topic","background","mood","characters","runtime","cutCount","style","characterGender"].forEach(id=>{
    const el=$(id);if(!el)return;
    el.addEventListener("input",()=>{clearTimeout(autoGenerateTimer);autoGenerateTimer=setTimeout(generateWorkflow,300);});
    el.addEventListener("change",()=>{clearTimeout(autoGenerateTimer);autoGenerateTimer=setTimeout(generateWorkflow,150);});
  });
}
window.addEventListener("load",()=>{setupAutoRegenerate();loadInputs();generateWorkflow();});
</script>
</body>
